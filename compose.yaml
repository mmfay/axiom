services:
  db:
    image: postgres:17
    container_name: axiom_db
    restart: unless-stopped

    env_file:
      - .env
    
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "5432:5432"

    volumes:
      - axiom_postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U axiom -d axiom"]
      interval: 5s
      timeout: '5s'
      retries: 10

volumes:
  axiom_postgres_data: