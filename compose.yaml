services:
  db:
    image: postgres:17
    container_name: axiom_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - axiom_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U axiom -d axiom"]
      interval: 5s
      timeout: '5s'
      retries: 10

  backend:
    image: mmfay3/axiom-backend:latest
    build:
      context: ./backend
    container_name: axiom_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  mcp:
    image: mmfay3/axiom-mcp:latest
    build:
      context: ./mcp
    container_name: axiom_mcp
    restart: unless-stopped
    env_file:
      - ./mcp/.env
    ports:
      - "8001:8001"
    depends_on:
      - backend

  frontend:
    image: mmfay3/axiom-frontend:latest
    build:
      context: ./frontend
    container_name: axiom_frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env.local
    ports:
      - "3000:3000"
    depends_on:
      - backend
    command: npx next dev -H 0.0.0.0

volumes:
  axiom_postgres_data: