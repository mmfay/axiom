<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8" />
	<title>Reset your password</title>
</head>
<body style="margin:0;padding:0;background:#f9fafb;font-family:Arial,sans-serif;">
	<div style="max-width:600px;margin:40px auto;background:#ffffff;border:1px solid #e5e7eb;border-radius:16px;padding:32px;">
		<h1 style="margin:0 0 16px;font-size:28px;color:#111827;">$app_name</h1>
		<p style="margin:0 0 16px;color:#374151;font-size:14px;">
			Hello,
		</p>
		<p style="margin:0 0 24px;color:#374151;font-size:14px;">
			We received a request to reset your password. Click the button below to continue.
		</p>
		<a
			href="$reset_url"
			style="display:inline-block;background:#2563eb;color:#ffffff;text-decoration:none;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:bold;"
		>
			Reset Password
		</a>
		<p style="margin:24px 0 0;color:#6b7280;font-size:12px;">
			If the button does not work, copy and paste this link into your browser:
		</p>
		<p style="word-break:break-all;color:#2563eb;font-size:12px;">$reset_url</p>
	</div>
</body>
</html>
